<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>First Kill Overlay</title>
    <style>
        @font-face {
            font-family: 'Transducer Condensed Medium';
            src: url('Transducer-CondensedMedium.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Transducer Condensed Medium', 'Arial', sans-serif;
        }

        #first-kill-banner {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            width: 700px;
            height: 180px;
            background: linear-gradient(135deg, #ce0700 0%, #490000 100%);
            border: 4px solid #000000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease;
        }

        #first-kill-banner.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .team-logo {
            width: 150px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            border-radius: 6px 0 0 6px;
        }
        .team-logo img {
            max-width: 100px;
            max-height: 100px;
            object-fit: contain;
        }

        .info-box {
            flex-grow: 1;
            padding: 0 30px;
            text-align: center;
            color: #ffffff;
        }
        .info-box .title {
            font-size: 80px;
            font-weight: 100;
            color: #ffffff;
            margin: 0;
            text-transform: uppercase;
            
        }
        .info-box .player-name {
            font-size: 50px;
            font-weight: 100;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .player-img {
            width: 200px;
            height: 100%;
            position: relative;
        }
        .player-img img {
            position: absolute;
            bottom: 0;
            right: 20px;
            height: 250px; /* ปรับความสูงให้รูปตัวแทนที่ส่งมายืนได้สวยพอดี */
            object-fit: contain;
        }
        /* โลโก้ทีมฝั่งซ้าย */
        .team-logo {
            width: 150px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* เปลี่ยนจาก background-color เป็น background-image */
            background-image: url('red_bg.jpg'); 
            background-size: cover; /* ให้รูปยืดเต็มกล่องพอดี */
            background-position: center; /* จัดรูปให้อยู่กึ่งกลาง */
            border-radius: 6px 0 0 6px;
            position: relative; /* เพิ่ม position เผื่อปรับแต่งเพิ่มเติม */
        }
        
        .team-logo img {
            max-width: 150px;
            max-height: 150px;
            object-fit: contain;
            position: relative; /* ให้โลโก้อยู่เหนือพื้นหลัง */
            z-index: 2; 
        }
        
        /* (Option) เพิ่มเลเยอร์สีดำบางๆ ทับรูปพื้นหลัง เผื่อรูปโลโก้สีกลืนกับพื้น */
        /* ถ้าไม่ต้องการให้ใส่คอมเมนต์ปิดไว้ได้เลยครับ */
        .team-logo::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.3); /* ปรับความทึบตรง 0.3 */
            border-radius: 6px 0 0 6px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="first-kill-banner">
        <div class="team-logo">
            <!-- โลโก้ถ้าหาไม่เจอจะถูกซ่อนทิ้งไปเลย -->
            <img id="fk-logo" src="" alt="Team Logo">
        </div>
        <div class="info-box">
            <div class="title">FIRST KILL</div>
            <div class="player-name" id="fk-name">PLAYER_NAME</div>
        </div>
        <div class="player-img">
            <!-- รูปผู้เล่นจะถูกจัดการ onerror ใน Javascript -->
            <img id="fk-player-img" src="" alt="Player Image">
        </div>
    </div>

    <script>
        // 1. ดึง Tournament ID จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const tournamentId = urlParams.get('tournament_id');

        if (!tournamentId) {
            console.error("No tournament_id found in URL");
        }

        // ==========================================
        // ตั้งค่า URL ของ XAMPP ตรงนี้
        // ==========================================
        const XAMPP_BASE_URL = "http://localhost/pubg_assets"; 

        const API_URL = `https://domestic.atum.live/api/pubg/liveleaderboard?account_id=nattapon7799&series=sea-thsc&tournament_id=${tournamentId}&mode=post&all_teams=true`;

        let currentMatchId = null;
        let hasFirstKillTriggered = false;

        async function fetchMatchData() {
            if (!tournamentId) return;

            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                const data = json.data;

                // ----------------------------------------------------
                // 1. โหลดข้อมูลครั้งแรก
                // ----------------------------------------------------
                if (currentMatchId === null) {
                    currentMatchId = data.matchId;
                    console.log("Joined match:", currentMatchId);
                    // เอาตัวล็อคออก เพื่อให้เวลารีเฟรช OBS มันไหลไปสั่งโชว์กราฟิกด้านล่างได้เลย
                }

                // ----------------------------------------------------
                // 2. ระบบรีเซ็ตเมื่อเริ่มแมตช์ใหม่
                // ----------------------------------------------------
                if (currentMatchId !== data.matchId) {
                    currentMatchId = data.matchId;
                    hasFirstKillTriggered = false; // ปลดล็อกให้พร้อมโชว์ในแมตช์ใหม่
                    console.log("✅ NEW MATCH DETECTED! Resetting First Kill...");
                }

                // ถ้ายิงกราฟิกไปแล้วในหน้าต่างนี้ ให้ข้ามไปเลย 
                if (hasFirstKillTriggered) return;

                // ----------------------------------------------------
                // 3. ระบบเช็คและแสดงผล First Kill
                // ----------------------------------------------------
                if (data.totalDieCount > 0) {
                    let firstKillerName = null;
                    let firstKillerTeamTag = null;

                    // วนลูปหาผู้เล่นคนแรกที่ทำคิลได้
                    for (const team of data.teams) {
                        const killer = team.players.find(p => p.match_kills > 0);
                        if (killer) {
                            firstKillerName = killer.name;
                            firstKillerTeamTag = team.team_tag;
                            break; 
                        }
                    }

                    // สั่งโชว์กราฟิก (โชว์สดตอนต้นเกม หรือ โชว์ตอนรีเฟรช OBS เพื่อเทสรูป)
                    if (firstKillerName) {
                        showFirstKillGraphic(firstKillerName, firstKillerTeamTag);
                        // พอยิงกราฟิกโชว์เทสไป 1 รอบแล้ว ค่อยล็อคไว้ไม่ให้เด้งซ้ำ
                        hasFirstKillTriggered = true; 
                    }
                }
            } catch (error) {
                console.error("API Fetch Error:", error);
            }
        }

        function showFirstKillGraphic(playerName, teamTag) {
            console.log(`🔥 FIRST KILL GRAPHIC TRIGGERED: ${playerName} (${teamTag})`);

            // อัปเดตข้อมูลบนหน้าจอ
            document.getElementById('fk-name').innerText = playerName;
            
            // จัดการภาพโลโก้
            const logoImg = document.getElementById('fk-logo');
            logoImg.onerror = function() {
                this.style.display = 'none';
            };
            logoImg.src = `${XAMPP_BASE_URL}/logos/${teamTag}.png`;
            logoImg.style.display = 'block';

            // จัดการภาพผู้เล่น
            const playerImg = document.getElementById('fk-player-img');
            playerImg.onerror = function() {
                this.onerror = null; 
                this.src = 'default_player.png'; // เปลี่ยนเป็นรูปหมวก 3 ถ้าไม่พบไฟล์ใน XAMPP
            };
            playerImg.src = `${XAMPP_BASE_URL}/players/${playerName}.png`; 
            playerImg.style.display = 'block';

            // สั่งโชว์แบนเนอร์
            const banner = document.getElementById('first-kill-banner');
            banner.classList.add('show');

            // หน่วงเวลา 7 วินาที แล้วซ่อนแบนเนอร์
            setTimeout(() => {
                banner.classList.remove('show');
            }, 7000);
        }

        // ดึงข้อมูลทุกๆ 1 วินาที
        setInterval(fetchMatchData, 1000);

    </script>
</body>
</html>
