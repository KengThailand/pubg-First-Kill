<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG First Kill Overlay - Name Only</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="first-kill-wrapper">
        <div class="fk-main-panel">
            <div class="fk-top-purple">
                <img id="fk-team-logo" src="" alt="Team Logo" class="team-logo">
                <div class="fk-title">FIRST KILL</div>
            </div>
            <div class="fk-bottom-white">
                <div id="fk-player-name" class="player-name">PLAYER_NAME</div>
            </div>
            <div class="fk-yellow-accent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
