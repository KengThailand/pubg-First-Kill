<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Kill Overlay Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            text-align: center;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border: none;
            border-radius: 5px;
            background: #151521;
            color: white;
            font-size: 16px;
        }
        button {
            background-color: #e5c100;
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ffd700;
        }
        .result-box {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 First Kill Generator</h2>
    <p>ระบุ Tournament ID</p>
    <input type="text" id="tourId" placeholder="เช่น sea-thsc">
    <button onclick="generateLink()">สร้างลิงก์สำหรับ OBS</button>

    <div class="result-box" id="resultBox">
        <p>นำลิงก์นี้ไปใส่ใน OBS Browser Source:</p>
        <input type="text" id="obsLink" readonly onclick="this.select(); document.execCommand('copy'); alert('คัดลอกแล้ว!');">
    </div>
</div>

<script>
    function generateLink() {
        const tourId = document.getElementById('tourId').value.trim();
        if(!tourId) {
            alert('กรุณาใส่ Tournament ID');
            return;
        }
        // ดึง path ปัจจุบันเพื่อสร้างลิงก์ overlay
        const baseUrl = window.location.href.replace('index.html', '').replace(/\/$/, '');
        const finalUrl = `${baseUrl}/overlay.html?tournament_id=${tourId}`;
        
        document.getElementById('obsLink').value = finalUrl;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
